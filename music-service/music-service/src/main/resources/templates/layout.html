<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Music Manager</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
	<link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<nav class="col-md-2 d-md-block sidebar py-4">
				<h4 class="text-white text-center mb-4">
					<i class="bi bi-music-note-beamed"></i> Music Manager
				</h4>
				<ul class="nav flex-column">
					<li class="nav-item">
						<a class="nav-link" href="/" th:href="@{/}"
							th:classappend="${activeMenu == 'dashboard'} ? 'active'">
							<i class="bi bi-speedometer2"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/albums" th:href="@{/albums}"
							th:classappend="${activeMenu == 'albums'} ? 'active'">
							<i class="bi bi-record-circle"></i> Albums
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/songs" th:href="@{/songs}"
							th:classappend="${activeMenu == 'songs'} ? 'active'">
							<i class="bi bi-music-note-list"></i> Songs
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/playlists" th:href="@{/playlists}"
							th:classappend="${activeMenu == 'playlists'} ? 'active'">
							<i class="bi bi-music-note-list"></i> Playlists
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/upload" th:href="@{/upload}"
							th:classappend="${activeMenu == 'upload'} ? 'active'">
							<i class="bi bi-cloud-upload"></i> Upload ZIP
						</a>
					</li>
				</ul>
			</nav>

			<!-- Main Content -->
			<main class="col-md-10 ms-sm-auto main-content py-4">
				<div th:replace="~{fragments/header :: header}"></div>

				<!-- Page Content -->
				<div class="container-fluid" th:replace="~{${contentTemplate} :: ${contentFragment}}">
				</div>
			</main>
		</div>
	</div>
	<script th:if="${activeMenu == 'albums'}" th:src="@{/layout.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/theme.js}"></script>

</body>



</html>
