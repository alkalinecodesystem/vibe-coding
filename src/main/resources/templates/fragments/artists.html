<div th:fragment="content">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h2>Artists</h2>
		<div>
			<a href="/" class="btn btn-outline-secondary me-2">
				<i class="bi bi-arrow-left"></i> Back to Dashboard
			</a>
		</div>
	</div>

	<div class="card border-0 shadow-sm mb-4">
		<div class="card-body">
			<form class="row g-2" th:action="@{/artists}" method="get" id="searchForm">
				<div class="col">
					<input type="text" id="search-input" name="q" class="form-control"
						placeholder="Search artists by name..." th:value="${searchQuery}" maxlength="100">
				</div>

				<div class="col-auto">
					<button type="submit" class="btn btn-primary">
						<i class="bi bi-search"></i> Search
					</button>
				</div>
			</form>
		</div>
	</div>

	<div class="card border-0 shadow-sm">
		<div class="card-body">
			<div class="table-responsive">
				<table class="table table-hover align-middle">
					<thead class="table-light">
						<tr>
							<th width="60">#</th>
							<th>Artist Name</th>
							<th class="text-end">Actions</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="artist, iterStat : ${artists}">
							<td th:text="${currentPage * size + iterStat.count}">1</td>
							<td>
								<div class="d-flex align-items-center">
									<div class="bg-primary bg-opacity-10 rounded p-2 me-2">
										<i class="bi bi-person text-primary"></i>
									</div>
									<span th:text="${artist.name}">Artist Name</span>
								</div>
							</td>
							<td class="text-end">
								<div class="d-inline-flex gap-1">
									<button class="btn btn-sm btn-outline-primary view-artist-btn"
										data-bs-toggle="modal" data-bs-target="#artistModal"
										th:data-artist-id="${artist.id}" th:data-artist-name="${artist.name}">
										<i class="bi bi-person"></i>
									</button>
									<button class="btn btn-sm btn-outline-primary view-artist-albums-btn"
										th:attr="data-artist-id=${artist.id}, data-artist-name=${artist.name}">
										<i class="bi bi-record-circle"></i>
									</button>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div th:if="${artists == null || artists.isEmpty()}" class="text-center py-5">
				<i class="bi bi-people fs-1 text-muted"></i>
				<h5 class="mt-3">No Artists Found</h5>
				<p class="text-muted">Try changing your search criteria.</p>
			</div>

			<div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3">
				<div class="d-flex align-items-center">
					<label class="me-2">Show:</label>
					<select id="sizeSelect" class="form-select form-select-sm size-select">
						<option th:value="10" th:selected="${size == 10}">10</option>
						<option th:value="20" th:selected="${size == 20}">20</option>
						<option th:value="30" th:selected="${size == 30}">30</option>
					</select>
					<span class="ms-2 text-muted">per page</span>
				</div>
				<nav aria-label="Artist pagination">
					<ul class="pagination pagination-sm mb-0">
						<li class="page-item" th:classappend="${isFirst} ? 'disabled'">
							<a class="page-link" th:href="@{/artists(page=0, size=${size}, q=${searchQuery ?: ''})}">
								<span aria-hidden="true">&laquo;&laquo;</span>
							</a>
						</li>
						<li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
							<a class="page-link"
								th:href="@{/artists(page=${currentPage - 1}, size=${size}, q=${searchQuery ?: ''})}">
								<span aria-hidden="true">&laquo;</span>
							</a>
						</li>
						<th:block
							th:with="startPage=${T(java.lang.Math).max(0, currentPage - 2)}, endPage=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
							<th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
								<li class="page-item" th:classappend="${i == currentPage ? 'active' : ''}">
									<th:block th:if="${i == currentPage}">
										<span class="page-link" th:text="${i + 1}">1</span>
									</th:block>
									<th:block th:if="${i != currentPage}">
										<a class="page-link"
											th:href="@{/artists(page=${i}, size=${size}, q=${searchQuery ?: ''})}"
											th:text="${i + 1}">1</a>
									</th:block>
								</li>
							</th:block>
						</th:block>
						<li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
							<a class="page-link"
								th:href="@{/artists(page=${currentPage + 1}, size=${size}, q=${searchQuery ?: ''})}">
								<span aria-hidden="true">&raquo;</span>
							</a>
						</li>
						<li class="page-item" th:classappend="${isLast} ? 'disabled'">
							<a class="page-link"
								th:href="@{/artists(page=${totalPages - 1}, size=${size}, q=${searchQuery ?: ''})}">
								<span aria-hidden="true">&raquo;&raquo;</span>
							</a>
						</li>
					</ul>
				</nav>
			</div>
		</div>
	</div>

	<div class="modal fade" id="artistAlbumsModal" tabindex="-1" aria-labelledby="artistAlbumsModalLabel"
		aria-hidden="true">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="artistAlbumsModalLabel">Artist Albums</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<div class="table-responsive modal-albums-scroll">
						<table class="table table-hover align-middle">
							<thead class="table-light">
								<tr>
									<th>Title</th>
									<th>Year</th>
									<th>Genre</th>
									<th>Songs</th>
								</tr>
							</thead>
							<tbody id="artist-albums-modal-table-body">
							</tbody>
						</table>
					</div>
					<div class="d-flex align-items-center mt-3">
						<div class="d-flex align-items-center">
							<label class="me-2">Show:</label>
							<select id="artistAlbumSizeSelect" class="form-select form-select-sm size-select">
								<option value="5" selected>5</option>
								<option value="10">10</option>
								<option value="15">15</option>
							</select>
							<span class="ms-2 text-muted">per page</span>
						</div>
						<div id="artist-albums-modal-pagination-wrapper" class="ms-auto"></div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>

	<script th:src="@{/artists.js}"></script>
</div>
