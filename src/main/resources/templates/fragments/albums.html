<div th:fragment="content">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h2>Albums</h2>
		<div>
			<a href="/" class="btn btn-outline-secondary me-2">
				<i class="bi bi-arrow-left"></i> Back to Dashboard
			</a>
		</div>
	</div>

	<!-- Search and Filters -->
	<div class="card border-0 shadow-sm mb-4">
		<div class="card-body">
			<form class="row g-3" th:action="@{/albums}" method="get">
				<div class="col-md-6">
					<input type="text" id="search-input" name="q" class="form-control"
						placeholder="Search albums by title, artist or song..." th:value="${searchQuery}">
				</div>
				<div class="col-md-4">
					<select name="type" class="form-select">
						<option value="all" th:attr="selected=${searchType == null or searchType == 'all'}">All Fields
						</option>
						<option value="title" th:attr="selected=${searchType == 'title'}">Search by Title</option>
						<option value="artist" th:attr="selected=${searchType == 'artist'}">Search by Artist</option>
						<option value="song" th:attr="selected=${searchType == 'song'}">Search by Song</option>
					    <option value="songOriginalArtist" th:attr="selected=${searchType == 'songOriginalArtist'}">Search by Song Original Artist</option>
					</select>
				</div>
				<div class="col-md-2">
					<button type="submit" class="btn btn-primary w-100">
						<i class="bi bi-search"></i> Search
					</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Search Results Count -->
	<p class="text-muted" id="search-results-count" style="display: none;">
		<span id="matching-count">0</span> of <span id="total-count">0</span> albums
	</p>

	<!-- Albums Grid -->
	<div class="row" th:if="${albums}">
		<div class="col-md-3 col-sm-6 mb-4" th:each="album : ${albums}">
			<div class="card h-100 border-0 shadow-sm card-hover">
				<div class="position-relative">
					<div th:if="${album.hasCover}" class="d-flex justify-content-center align-items-center bg-light album-cover-container">
						<img th:src="'data:' + ${album.coverContentType} + ';base64,' + ${album.coverImageBase64}"
							class="img-fluid album-cover" alt="Album cover">
					</div>
					<div th:if="${!album.hasCover}" class="d-flex justify-content-center align-items-center bg-light album-cover-container">
						<i class="bi bi-music-note text-muted fs-1"></i>
					</div>
					<span class="position-absolute top-0 end-0 p-2">
						<span class="badge bg-primary rounded-pill" th:text="${album.songCount}?:0">0</span>
					</span>
				</div>
				<div class="card-body">
					<h6 class="card-title text-truncate" th:text="${album.title}">Album</h6>
					<p class="text-muted small mb-1" th:text="${album.artistName}">Artist</p>
					<p class="small text-muted mb-0" th:if="${album.releaseYear}" th:text="${album.releaseYear}">1969
					</p>
					<p class="small text-muted mb-0" th:if="${album.genere}" th:text="${album.genere}">Rock</p>
				</div>
				<div class="card-footer bg-transparent border-0">
					<div class="d-grid gap-2">
						<button class="btn btn-sm btn-outline-primary"
                            th:onclick="|window.location.href='/albums/' + ${album.id}|">
                            <i class="bi bi-eye"></i> View Details
                        </button>
						<button th:if="${album.artistId}" class="btn btn-sm btn-outline-primary view-artist-btn" data-bs-toggle="modal"
							data-bs-target="#artistModal" th:data-artist-id="${album.artistId}"
							th:data-artist-name="${album.artistName}">
							<i class="bi bi-person"></i> View Artist
						</button>
						<button class="btn btn-sm btn-outline-primary play-album-btn" data-bs-toggle="modal"
							data-bs-target="#albumModal" th:data-album-id="${album.id}"
							th:data-album-title="${album.title}" th:data-album-artist="${album.artistName}">
							<i class="bi bi-play-circle"></i> Play Album
						</button>	
						<button class="btn btn-sm btn-outline-primary"
                             th:onclick="|window.location.href='@{/api/albums/{id}/download(id=${album.id})}'|">
                             <i class="bi bi-file-earmark-zip"></i> Download ZIP
                        </button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Empty State -->
	<div th:if="${albums == null || albums.isEmpty()}" class="text-center py-5">
		<i class="bi bi-record-circle fs-1 text-muted"></i>
		<h4 class="mt-3">No Albums Yet</h4>
		<p class="text-muted">Start by uploading a ZIP file with your music collection.</p>
		<a href="/upload" class="btn btn-primary">
			<i class="bi bi-cloud-upload"></i> Upload ZIP
		</a>
	</div>

	<!-- Modal for Album Player -->
	<div class="modal fade" id="albumModal" tabindex="-1" aria-labelledby="albumModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-xl">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="albumModalLabel">Album Player</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<div class="row">
						<div class="col-md-4">
							<div id="modal-album-info" class="text-center">
								<div id="modal-album-cover" class="mb-3 d-flex align-items-center justify-content-center" style="min-height: 140px;"></div>
								<h4 id="modal-album-title"></h4>
								<p id="modal-album-artist" class="text-muted"></p>
							</div>
						</div>
						<div class="col-md-8">
							<!-- Audio Controls -->
							<div id="audio-controls" class="mb-3" style="display: none;">
								<div class="d-flex align-items-center justify-content-center mb-2">
									<button id="shuffle-btn" class="btn btn-outline-secondary me-2" title="Shuffle">
										<i class="bi bi-shuffle"></i>
									</button>
									<button id="prev-btn" class="btn btn-outline-secondary me-2">
										<i class="bi bi-skip-start"></i>
									</button>
									<button id="play-pause-btn" class="btn btn-primary me-2">
										<i class="bi bi-play-fill"></i>
									</button>
									<button id="next-btn" class="btn btn-outline-secondary me-2">
										<i class="bi bi-skip-end"></i>
									</button>
									<button id="repeat-btn" class="btn btn-outline-secondary me-2" title="Repeat">
										<i class="bi bi-repeat"></i>
									</button>
								</div>
								<div class="mb-2">
									<small id="current-song-title" class="text-muted"></small>
								</div>
								<div class="progress audio-progress">
									<div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%">
									</div>
								</div>
								<div class="d-flex justify-content-between mt-1">
									<small id="current-time">0:00</small>
									<small id="total-time">0:00</small>
								</div>
								<div class="d-flex align-items-center mt-2">
									<i class="bi bi-volume-down me-2"></i>
									<input type="range" class="form-range flex-grow-1" id="volume-slider" min="0" max="100" value="50" step="1">
									<i class="bi bi-volume-up ms-2"></i>
								</div>
							</div>

							<!-- Song List -->
							<div id="modal-song-list" class="modal-song-list-scroll">
								<!-- Song list will be inserted here -->
							</div>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Modal for Artist Info -->
	<div class="modal fade" id="artistModal" tabindex="-1" aria-labelledby="artistModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="artistModalLabel">Artist Information</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<div id="artist-info">
						<!-- Artist info will be loaded here -->
					</div>
				</div>
			</div>
		</div>
	</div>
 	<script th:src="@{/albums.js}"></script>
 	<script th:src="@{/artist.js}"></script>
 	<script>
 		(function() {
 			function reinitScripts() {
 				if (typeof initAlbums === 'function') { try { initAlbums(); } catch (e) {} }
 				if (typeof initArtist === 'function') { try { initArtist(); } catch (e) {} }
 			}
 			document.addEventListener('DOMContentLoaded', function() {
 				var albumModal = document.getElementById('albumModal');
 				var artistModal = document.getElementById('artistModal');
 				if (albumModal) albumModal.addEventListener('show.bs.modal', reinitScripts);
 				if (artistModal) artistModal.addEventListener('show.bs.modal', reinitScripts);
 			});
 		})();
		document.getElementById('albumModal').addEventListener('shown.bs.modal', () => {
           document.getElementById('modal-song-list').scrollTop = 0;
        });
 	</script>
 </div>
