<div th:fragment="content">
	<h2 class="mb-4">Dashboard</h2>

	<!-- Statistics Cards -->
	<div class="row mb-4">
		<div class="col-md-3 mb-3">
			<div class="card stat-card p-3">
				<div class="d-flex justify-content-between align-items-center">
					<div>
						<h3 class="mb-0" th:text="${totalArtists}?:0">0</h3>
						<p class="text-muted mb-0">Artists</p>
					</div>
					<div class="bg-primary bg-opacity-10 rounded p-3">
						<i class="bi bi-person-check fs-3 text-primary"></i>
					</div>
				</div>
			</div>
		</div>
		<div class="col-md-3 mb-3">
			<div class="card stat-card p-3">
				<div class="d-flex justify-content-between align-items-center">
					<div>
						<h3 class="mb-0" th:text="${totalAlbums}?:0">0</h3>
						<p class="text-muted mb-0">Albums</p>
					</div>
					<div class="bg-success bg-opacity-10 rounded p-3">
						<i class="bi bi-record-circle fs-3 text-success"></i>
					</div>
				</div>
			</div>
		</div>
		<div class="col-md-3 mb-3">
			<div class="card stat-card p-3">
				<div class="d-flex justify-content-between align-items-center">
					<div>
						<h3 class="mb-0" th:text="${totalSongs}?:0">0</h3>
						<p class="text-muted mb-0">Songs</p>
					</div>
					<div class="bg-warning bg-opacity-10 rounded p-3">
						<i class="bi bi-music-note-list fs-3 text-warning"></i>
					</div>
				</div>
			</div>
		</div>
		<div class="col-md-3 mb-3">
			<div class="card stat-card p-3">
				<div class="d-flex justify-content-between align-items-center">
					<div>
						<h3 class="mb-0" th:text="${totalCovers}?:0">0</h3>
						<p class="text-muted mb-0">Album Covers</p>
					</div>
					<div class="bg-info bg-opacity-10 rounded p-3">
						<i class="bi bi-image fs-3 text-info"></i>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Quick Actions -->
	<div class="row mb-4">
		<div class="col-12">
			<div class="card border-0 shadow-sm">
				<div class="card-body">
					<h5 class="card-title">Quick Actions</h5>
					<div class="d-flex gap-3 flex-wrap">
						<a href="/upload" class="btn btn-primary">
							<i class="bi bi-cloud-upload"></i> Upload ZIP File
						</a>
						<a href="/artists" class="btn btn-outline-primary">
							<i class="bi bi-person-check"></i> View Artists
						</a>
						<a href="/albums" class="btn btn-outline-primary">
							<i class="bi bi-record-circle"></i> View Albums
						</a>
						<a href="/songs" class="btn btn-outline-primary">
							<i class="bi bi-music-note-list"></i> View Songs
						</a>
			            <a href="/playlists" class="btn btn-outline-primary">
							<i class="bi bi-boombox"></i> View Playlists
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Random Albums -->
	<div class="row">
		<div class="col-12">
			<div class="card border-0 shadow-sm">
				<div class="card-body">
					<div class="d-flex justify-content-between align-items-center mb-3">
						<h5 class="card-title mb-0">Random Albums</h5>
						<a href="/albums" class="btn btn-sm btn-outline-primary">View All</a>
					</div>
					<div class="row" th:if="${randomAlbums != null && !randomAlbums.isEmpty()}">
						<div class="col-md-3 mb-3" th:each="album : ${randomAlbums}">
							<div class="card card-hover h-100">
								<div class="card-body text-center">
									<div th:if="${album.hasCover}">
										<img th:src="'data:' + ${album.coverContentType} + ';base64,' + ${album.coverImageBase64}"
											class="album-cover mb-3" alt="Album cover">
									</div>
									<div th:if="${!album.hasCover}"
										class="album-cover bg-light d-flex align-items-center justify-content-center mx-auto mb-3">
										<i class="bi bi-music-note text-muted fs-1"></i>
									</div>
									<h6 class="card-title text-truncate" th:text="${album.title}">Album Title</h6>
									<p class="text-muted small mb-0" th:text="${album.artistName}">Artist</p>
								</div>
							</div>
						</div>
					</div>
					<div th:if="${randomAlbums == null || randomAlbums.isEmpty()}">
						<p class="text-muted">No albums yet. <a href="/upload">Upload a ZIP file</a> to get started!</p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
