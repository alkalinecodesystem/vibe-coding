# Server Port
server.port=8081

# Application Name
spring.application.name=music-service

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:musicdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.max-swallow-size=-1

# Extracted files storage location (outside microservice)
app.upload.extracted-dir=/home/user/music-extracted

# Playlists storage location
app.playlists.dir=/home/user/playlists

# Logging
logging.level.com.example.musicservice=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.web.servlet.resource=ERROR

# Ignore these requests
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
